<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoD Cyber Scanner - Heimdall Lite Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https: cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https:; img-src data: https:;">
</head>
<body class="bg-gray-900 text-gray-100">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">DoD Browser Cyber Scanner</h1>
            <div class="flex items-center gap-4">
                <span class="bg-green-600 text-white text-xs px-3 py-1 rounded-full font-mono">v0.3.9-debug-20250510</span>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-700">
            <button onclick="switchTab(0)" class="tab-button px-6 py-3 border-b-2 border-blue-500 text-blue-400">Dashboard</button>
            <button onclick="switchTab(1)" class="tab-button px-6 py-3">Scan</button>
            <button onclick="switchTab(2)" class="tab-button px-6 py-3">Results</button>
            <button onclick="switchTab(3)" class="tab-button px-6 py-3">SBOM</button>
            <button onclick="switchTab(4)" class="tab-button px-6 py-3">History</button>
        </div>

        <!-- Scan Tab -->
        <div id="tab-1" class="tab-content p-6">
            <textarea id="codeInput" class="w-full h-96 bg-gray-950 border border-gray-600 rounded-xl p-4 font-mono text-sm" placeholder="Paste your code here for security analysis..."></textarea>
            <button onclick="runScan()" class="mt-4 bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-xl font-semibold">🚀 Run Security Scan</button>
        </div>

        <!-- Other tabs placeholder -->
        <div id="tab-0" class="tab-content p-6 hidden">Dashboard Content</div>
        <div id="tab-2" class="tab-content p-6 hidden">Results will appear here</div>
        <div id="tab-3" class="tab-content p-6 hidden">SBOM Viewer</div>
        <div id="tab-4" class="tab-content p-6 hidden">Scan History</div>
    </div>

    <script>
        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + n).classList.remove('hidden');
        }

        function runScan() {
            const code = document.getElementById('codeInput').value.trim();
            if (!code) {
                alert('Please paste some code to scan');
                return;
            }
            alert('Scan completed! Check Results tab.\n\nFindings simulated for demo.\n\nHIGH: Command Injection detected\nHIGH: Hardcoded credential detected');
            switchTab(2);
        }

        // Start on Scan tab
        window.onload = () => switchTab(1);
    </script>
</body>
</html>
