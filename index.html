<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoD Browser Cyber Scanner - Heimdall Lite Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .tab-active { border-bottom: 3px solid #3b82f6; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">DoD Cyber Scanner</h1>
                <p class="text-gray-400">Browser-based SAST + SBOM Viewer (Static)</p>
            </div>
            <div class="flex items-center gap-4">
                <span id="version-badge" class="px-3 py-1 bg-blue-900 text-blue-300 text-sm font-mono rounded-full">v0.3.5-debug-20250510</span>
                <span class="text-xs text-gray-500">NIST RMF / SLSA Demo Tool</span>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-700 mb-6">
            <button onclick="switchTab(0)" class="tab px-6 py-3 tab-active" id="tab-0">Dashboard</button>
            <button onclick="switchTab(1)" class="tab px-6 py-3" id="tab-1">Scan</button>
            <button onclick="switchTab(2)" class="tab px-6 py-3" id="tab-2">Results</button>
            <button onclick="switchTab(3)" class="tab px-6 py-3" id="tab-3">SBOM</button>
            <button onclick="switchTab(4)" class="tab px-6 py-3" id="tab-4">History</button>
            <button onclick="switchTab(5)" class="tab px-6 py-3" id="tab-5">Rules</button>
        </div>

        <!-- Tab Contents -->
        <div id="tab-content-0" class="tab-content">Dashboard content here...</div>
        <div id="tab-content-1" class="tab-content hidden">Scan tab here...</div>
        <!-- More tabs would be here in full version -->

        <script>
            function switchTab(n) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
                document.getElementById('tab-'+n).classList.add('tab-active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById('tab-content-'+n).classList.remove('hidden');
            }

            // Simple demo scan function
            function runScan() {
                alert('Scan completed! (Demo mode - full version in next push)');
            }

            // Initialize
            window.onload = () => switchTab(0);
        </script>
    </div>
</body>
</html>
